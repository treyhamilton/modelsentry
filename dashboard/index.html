<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelSentry</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    /* ── Reset & base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --stable:   #22c55e;
      --warning:  #f59e0b;
      --critical: #ef4444;
      --unknown:  #64748b;
      --radius:   8px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .logo span { color: var(--stable); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    #countdown {
      color: var(--muted);
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--text); color: var(--text); }

    #model-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0.6rem 1.25rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--stable); color: var(--text); }
    .tab-dot { font-size: 0.65rem; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    /* ── Health card ─────────────────────────────────────────────────── */
    .health-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .health-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .sev-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sev-dot { font-size: 1.4rem; }
    .sev-label { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.08em; }
    .health-stats {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-val { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── Banners ─────────────────────────────────────────────────────── */
    .banner {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      border: 1px solid;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .banner-stable   { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.4);  color: var(--stable);   }
    .banner-warning  { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); color: var(--warning);  }
    .banner-critical { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.4);  color: var(--critical); }
    .banner-unknown  { background: rgba(100,116,139,0.1);border-color: rgba(100,116,139,0.4);color: var(--unknown);  }

    /* ── Section titles ──────────────────────────────────────────────── */
    .section { margin-bottom: 1.5rem; }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Drift table ─────────────────────────────────────────────────── */
    .table-scroll { overflow-x: auto; }
    .drift-table { width: 100%; border-collapse: collapse; }
    .drift-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .drift-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      vertical-align: middle;
    }
    .feature-row { cursor: default; }
    .feature-row:hover td { background: rgba(255,255,255,0.025); }
    .feature-name { font-weight: 600; }
    .mono { font-variant-numeric: tabular-nums; }

    /* ── Severity badges ─────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-stable   { background: rgba(34,197,94,0.15);   color: var(--stable);   border: 1px solid rgba(34,197,94,0.3);   }
    .badge-warning  { background: rgba(245,158,11,0.15);  color: var(--warning);  border: 1px solid rgba(245,158,11,0.3);  }
    .badge-critical { background: rgba(239,68,68,0.15);   color: var(--critical); border: 1px solid rgba(239,68,68,0.3);   }
    .badge-unknown  { background: rgba(100,116,139,0.15); color: var(--unknown);  border: 1px solid rgba(100,116,139,0.3); }

    /* ── Charts ──────────────────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .chart-card { padding: 1rem; }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .chart-feature-name { font-weight: 600; font-size: 0.9rem; }
    .chart-container { position: relative; height: 200px; }
    .chart-container canvas { display: block; }

    /* ── Alert history ────────────────────────────────────────────────── */
    .alert-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .alert-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .alert-dot { font-size: 0.65rem; padding-top: 0.3rem; flex-shrink: 0; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .alert-ts { color: var(--muted); font-size: 0.8rem; }
    .alert-features { font-size: 0.8rem; color: var(--muted); }
    .drift-feature { font-weight: 600; }

    /* ── Empty / loading / error states ─────────────────────────────── */
    .state-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 40vh;
      text-align: center;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--stable);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 2rem; color: var(--warning); }
    .no-models {
      max-width: 560px;
      margin: 3rem auto;
    }
    .no-models h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
    .no-models .muted { margin-bottom: 0.5rem; }
    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin: 0.75rem 0;
      font-size: 0.82rem;
      overflow-x: auto;
      color: var(--text);
      white-space: pre;
      line-height: 1.7;
    }
    code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-size: 0.85em;
      font-family: inherit;
    }
    .muted { color: var(--muted); }

    /* ── Mobile ───────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { flex-wrap: wrap; padding: 0.6rem 1rem; }
      main { padding: 1rem; }
      .health-stats { gap: 1rem; }
      .sev-label { font-size: 1.1rem; }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Model<span>Sentry</span></span>
  <div class="header-right">
    <span id="countdown">⟳ 60s</span>
    <button class="btn" id="refresh-btn">Refresh now</button>
  </div>
</header>

<div id="model-tabs"></div>

<main id="app">
  <div class="state-center">
    <div class="spinner"></div>
    <p>Loading ModelSentry...</p>
  </div>
</main>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const REFRESH_INTERVAL = 60;
const COLORS = {
  stable:   '#22c55e',
  warning:  '#f59e0b',
  critical: '#ef4444',
  unknown:  '#64748b',
};

// ── State ──────────────────────────────────────────────────────────────────
let S = {
  models:    [],
  selected:  null,
  status:    {},
  features:  {},
  drift:     {},
  countdown: REFRESH_INTERVAL,
  loading:   true,
  error:     null,
  refreshing: false,
};
let chartInstances = {};

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  startCountdown();
  loadAll();
  document.getElementById('refresh-btn').addEventListener('click', () => {
    if (S.refreshing) return;
    S.countdown = REFRESH_INTERVAL;
    loadAll();
  });
});

// ── Data fetching ──────────────────────────────────────────────────────────
async function loadAll() {
  if (S.refreshing) return;
  S.refreshing = true;
  updateRefreshLabel('⟳ refreshing…');
  try {
    const resp = await fetch('/api/models');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    S.models = data.models || [];
    S.error = null;

    if (!S.selected || !S.models.includes(S.selected)) {
      S.selected = S.models[0] || null;
    }

    if (S.models.length > 0) {
      await Promise.all(S.models.map(id => loadModel(id)));
    }
  } catch (e) {
    S.error = 'Cannot reach ModelSentry server. Is it running?';
  } finally {
    S.loading = false;
    S.refreshing = false;
    updateRefreshLabel('⟳ ' + S.countdown + 's');
    render();
  }
}

async function loadModel(id) {
  try {
    const enc = encodeURIComponent(id);
    const [sr, fr, dr] = await Promise.all([
      fetch('/api/models/' + enc + '/status'),
      fetch('/api/models/' + enc + '/features'),
      fetch('/api/models/' + enc + '/drift?limit=10'),
    ]);
    if (sr.ok) S.status[id]   = await sr.json();
    if (fr.ok) S.features[id] = await fr.json();
    if (dr.ok) S.drift[id]    = await dr.json();
  } catch (e) {
    console.warn('Failed to load model', id, e);
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────
function render() {
  const app   = document.getElementById('app');
  const tabs  = document.getElementById('model-tabs');

  if (S.loading) {
    tabs.innerHTML = '';
    app.innerHTML  = '<div class="state-center"><div class="spinner"></div><p>Loading ModelSentry...</p></div>';
    return;
  }

  if (S.error && S.models.length === 0) {
    tabs.innerHTML = '';
    app.innerHTML  = '<div class="state-center"><p class="error-icon">⚠</p><p>' + esc(S.error) + '</p><p class="muted">Retrying on next interval.</p></div>';
    return;
  }

  if (S.models.length === 0) {
    tabs.innerHTML = '';
    app.innerHTML  = renderNoModels();
    return;
  }

  // Tabs
  tabs.innerHTML = renderTabs();
  tabs.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { S.selected = btn.dataset.model; render(); });
  });

  // Destroy stale charts, then render
  destroyCharts();
  app.innerHTML = renderModelView(S.selected);

  // Build charts after DOM is updated
  const featData = S.features[S.selected];
  if (featData && featData.features) {
    featData.features.forEach(f => buildChart(f));
  }
}

// ── Sub-renderers ──────────────────────────────────────────────────────────
function renderNoModels() {
  return '<div class="no-models card">' +
    '<h2>No models monitored yet</h2>' +
    '<p class="muted">Quick start:</p>' +
    '<pre class="code-block">pip install modelsentry\n\nimport modelsentry as ms\nms.init(model_id="my-model")\n\n@ms.monitor(model_id="my-model")\ndef predict(features):\n    return model.predict(features)</pre>' +
    '<p class="muted">Then run <code>modelsentry serve --model my-model</code> and refresh this page.</p>' +
    '</div>';
}

function renderTabs() {
  if (S.models.length <= 1) return '';
  return S.models.map(id => {
    const sev    = (S.status[id] || {}).overall_severity || 'unknown';
    const active = id === S.selected ? ' active' : '';
    return '<button class="tab-btn' + active + '" data-model="' + escAttr(id) + '">' +
      '<span class="tab-dot" style="color:' + col(sev) + '">●</span> ' + esc(id) +
      '</button>';
  }).join('');
}

function renderModelView(modelId) {
  const status    = S.status[modelId]   || {};
  const featData  = S.features[modelId] || { features: [], has_baseline: false, has_current: false };
  const reports   = S.drift[modelId]    || [];
  const features  = featData.features   || [];

  const sev       = status.overall_severity || 'unknown';
  const allStable = features.length > 0 && features.every(f => f.severity === 'stable');

  return '<div>' +
    renderHealthCard(status) +
    renderStatusBanner(sev, features, featData) +
    (allStable ? renderNominalBanner() : '') +
    (features.length > 0 ? renderDriftTable(features) : '') +
    (features.length > 0 ? renderChartsSection(features) : '') +
    renderAlertHistory(reports) +
  '</div>';
}

function renderHealthCard(status) {
  const sev       = status.overall_severity || 'unknown';
  const count     = status.prediction_count  || 0;
  const lastUpd   = status.last_updated ? formatRelative(status.last_updated) : 'never';
  const baseReady = status.baseline_exists ? 'Ready' : 'Pending';
  const icon      = sev === 'stable' ? '●' : (sev === 'unknown' ? '○' : '⚠');

  return '<div class="health-card card" style="border-left:4px solid ' + col(sev) + ';margin-bottom:1rem">' +
    '<div class="health-top">' +
      '<div class="sev-indicator">' +
        '<span class="sev-dot" style="color:' + col(sev) + '">' + icon + '</span>' +
        '<span class="sev-label" style="color:' + col(sev) + '">' + esc(sev.toUpperCase()) + '</span>' +
      '</div>' +
      '<div class="health-stats">' +
        '<div class="stat"><span class="stat-val">' + fmtCount(count) + '</span><span class="stat-label">predictions monitored</span></div>' +
        '<div class="stat"><span class="stat-val">' + esc(lastUpd) + '</span><span class="stat-label">last updated</span></div>' +
        '<div class="stat"><span class="stat-val">' + baseReady + '</span><span class="stat-label">baseline</span></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderStatusBanner(sev, features, featData) {
  if (!featData.has_baseline) {
    return '<div class="banner banner-unknown"><span>○</span> Establishing baseline — collecting first predictions</div>';
  }
  if (sev === 'unknown') {
    return '<div class="banner banner-unknown"><span>○</span> Monitoring in progress — drift analysis pending</div>';
  }
  if (sev === 'critical') {
    const n = features.filter(f => f.severity === 'critical' || f.severity === 'warning').length;
    return '<div class="banner banner-critical"><span>⚠</span> Drift detected — ' + n + ' feature' + (n !== 1 ? 's' : '') + ' drifting</div>';
  }
  if (sev === 'warning') {
    const n = features.filter(f => f.severity !== 'stable' && f.severity !== 'unknown').length;
    return '<div class="banner banner-warning"><span>⚠</span> Warning — ' + n + ' feature' + (n !== 1 ? 's' : '') + ' showing drift</div>';
  }
  return '';
}

function renderNominalBanner() {
  return '<div class="banner banner-stable"><span>✓</span> All systems nominal — no drift detected</div>';
}

function renderDriftTable(features) {
  const rows = features.map(f => {
    const psi = f.psi    != null ? f.psi.toFixed(4)    : '—';
    const ks  = f.ks_p_value != null ? f.ks_p_value.toFixed(3) : '—';
    return '<tr class="feature-row" style="border-left:3px solid ' + col(f.severity) + '">' +
      '<td class="feature-name">' + esc(f.name) + '</td>' +
      '<td>' + esc(f.dtype) + '</td>' +
      '<td class="mono">' + psi + '</td>' +
      '<td class="mono">' + ks + '</td>' +
      '<td><span class="badge badge-' + esc(f.severity) + '">' + esc(f.severity.toUpperCase()) + '</span></td>' +
    '</tr>';
  }).join('');

  return '<div class="section">' +
    '<h3 class="section-title">Feature Drift Scores</h3>' +
    '<div class="table-scroll">' +
      '<table class="drift-table">' +
        '<thead><tr><th>Feature</th><th>Type</th><th>PSI</th><th>KS p-value</th><th>Severity</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function renderChartsSection(features) {
  const cards = features.map(f => {
    const hasData = f.baseline_distribution || f.current_distribution ||
                    f.baseline_value_counts || f.current_value_counts;
    if (!hasData) return '';
    const cid = 'chart-' + f.name.replace(/[^a-zA-Z0-9]/g, '_');
    return '<div class="chart-card card">' +
      '<div class="chart-header">' +
        '<span class="chart-feature-name">' + esc(f.name) + '</span>' +
        '<span class="badge badge-' + esc(f.severity) + '">' + esc(f.severity.toUpperCase()) + '</span>' +
      '</div>' +
      '<div class="chart-container"><canvas id="' + cid + '"></canvas></div>' +
    '</div>';
  }).filter(Boolean).join('');

  if (!cards) return '';
  return '<div class="section">' +
    '<h3 class="section-title">Feature Distributions</h3>' +
    '<div class="charts-grid">' + cards + '</div>' +
  '</div>';
}

function renderAlertHistory(reports) {
  const title = '<h3 class="section-title">Recent Drift Events</h3>';
  if (!reports || reports.length === 0) {
    return '<div class="section">' + title + '<p class="muted" style="padding:0.5rem 0">No drift events recorded yet.</p></div>';
  }

  const items = reports.map(r => {
    const ts  = r.detected_at ? fmtTimestamp(r.detected_at) : '—';
    const sev = r.overall_severity || 'unknown';

    const drifting = Object.entries(r.feature_results || {})
      .filter(([, v]) => v.severity !== 'stable')
      .sort((a, b) => (['critical','warning','unknown'].indexOf(a[1].severity)) -
                      (['critical','warning','unknown'].indexOf(b[1].severity)));

    let featHtml;
    if (drifting.length === 0) {
      featHtml = '<span class="muted">All features stable</span>';
    } else {
      const shown = drifting.slice(0, 5).map(([name, v]) =>
        '<span class="drift-feature" style="color:' + col(v.severity) + '">' + esc(name) + ' → ' + esc(v.severity) + '</span>'
      );
      if (drifting.length > 5) shown.push('<span class="muted">+' + (drifting.length - 5) + ' more</span>');
      featHtml = shown.join(' · ');
    }

    return '<div class="alert-item">' +
      '<div class="alert-dot" style="color:' + col(sev) + '">●</div>' +
      '<div class="alert-body">' +
        '<div class="alert-header">' +
          '<span class="badge badge-' + esc(sev) + '">' + esc(sev.toUpperCase()) + '</span>' +
          '<span class="alert-ts">' + esc(ts) + '</span>' +
        '</div>' +
        '<div class="alert-features">' + featHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="section">' + title + '<div class="alert-list">' + items + '</div></div>';
}

// ── Charts ─────────────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};
}

function buildChart(feature) {
  const cid    = 'chart-' + feature.name.replace(/[^a-zA-Z0-9]/g, '_');
  const canvas = document.getElementById(cid);
  if (!canvas) return;

  const sev        = feature.severity;
  const curColor   = col(sev);
  let labels, baseData, curData;

  if (feature.dtype === 'numeric') {
    const bd = feature.baseline_distribution;
    const cd = feature.current_distribution;
    const edges = (bd || cd || {}).bin_edges;
    if (!edges || edges.length < 2) return;
    labels   = binMids(edges).map(v => v.toFixed(1));
    baseData = bd ? bd.bin_counts : new Array(labels.length).fill(0);
    curData  = cd ? cd.bin_counts : new Array(labels.length).fill(0);
  } else {
    const bc = feature.baseline_value_counts || {};
    const cc = feature.current_value_counts  || {};
    const keys = [...new Set([...Object.keys(bc), ...Object.keys(cc)])].sort();
    labels   = keys.map(k => k.length > 12 ? k.slice(0,11) + '…' : k);
    baseData = keys.map(k => bc[k] || 0);
    curData  = keys.map(k => cc[k] || 0);
  }

  const baseRgba = 'rgba(100,116,139,0.4)';
  const curRgba  = hexRgba(curColor, 0.5);

  chartInstances[cid] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Baseline', data: baseData,
          backgroundColor: baseRgba, borderColor: 'rgba(100,116,139,0.9)', borderWidth: 1 },
        { label: 'Current',  data: curData,
          backgroundColor: curRgba,  borderColor: hexRgba(curColor, 0.9),  borderWidth: 1 },
      ],
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#94a3b8', boxWidth: 10, font: { size: 11 } },
        },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#334155',
          borderWidth: 1,
        },
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 10 }, maxRotation: labels.length > 8 ? 45 : 0 },
          grid:  { color: '#1e293b' },
        },
        y: {
          ticks: { color: '#64748b', font: { size: 10 } },
          grid:  { color: '#334155' },
        },
      },
    },
  });
}

function binMids(edges) {
  const out = [];
  for (let i = 0; i < edges.length - 1; i++) out.push((edges[i] + edges[i+1]) / 2);
  return out;
}

// ── Countdown ──────────────────────────────────────────────────────────────
function startCountdown() {
  setInterval(() => {
    if (S.refreshing) return;
    S.countdown = Math.max(0, S.countdown - 1);
    updateRefreshLabel('⟳ ' + S.countdown + 's');
    if (S.countdown === 0) {
      S.countdown = REFRESH_INTERVAL;
      loadAll();
    }
  }, 1000);
}

function updateRefreshLabel(text) {
  const el = document.getElementById('countdown');
  if (el) el.textContent = text;
}

// ── Utility ────────────────────────────────────────────────────────────────
function col(sev) { return COLORS[sev] || COLORS.unknown; }

function fmtCount(n) { return (n || 0).toLocaleString(); }

function fmtTimestamp(iso) {
  try {
    return new Date(iso).toISOString().replace('T',' ').slice(0,16) + ' UTC';
  } catch(e) { return String(iso); }
}

function formatRelative(iso) {
  try {
    const ms   = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(ms / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  } catch(e) { return '—'; }
}

function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) { return String(s ?? '').replace(/"/g,'&quot;'); }
</script>
