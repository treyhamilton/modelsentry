<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelSentry — Live Demo</title>
  <meta name="description" content="Interactive demo of the ModelSentry dashboard with simulated drift events.">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --stable:   #22c55e;
      --warning:  #f59e0b;
      --critical: #ef4444;
      --unknown:  #64748b;
      --radius:   8px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--stable); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .demo-tag {
      background: rgba(245,158,11,0.15);
      color: var(--warning);
      border: 1px solid rgba(245,158,11,0.4);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--text); color: var(--text); }

    .demo-banner {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }
    .demo-banner code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-family: inherit;
      color: var(--text);
    }
    .demo-banner a { color: var(--stable); text-decoration: none; }
    .demo-banner a:hover { text-decoration: underline; }

    #model-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 0.6rem 1.25rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { border-bottom-color: var(--stable); color: var(--text); }
    .tab-dot { font-size: 0.65rem; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .health-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .health-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .sev-indicator { display: flex; align-items: center; gap: 0.5rem; }
    .sev-dot { font-size: 1.4rem; }
    .sev-label { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.08em; }
    .health-stats { display: flex; gap: 2rem; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; }
    .stat-val { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

    .banner {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      border: 1px solid;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .banner-stable   { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.4);  color: var(--stable);   }
    .banner-warning  { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); color: var(--warning);  }
    .banner-critical { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.4);  color: var(--critical); }

    /* Drift control row */
    .control-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .btn-action {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .btn-drift   { background: var(--critical); color: #0f172a; border-color: var(--critical); }
    .btn-drift:hover   { background: #dc2626; }
    .btn-reset   { background: var(--stable);   color: #0f172a; border-color: var(--stable); }
    .btn-reset:hover   { background: #16a34a; }
    .control-hint { color: var(--muted); font-size: 0.8rem; }

    .section { margin-bottom: 1.5rem; }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .table-scroll { overflow-x: auto; }
    .drift-table { width: 100%; border-collapse: collapse; }
    .drift-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .drift-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      vertical-align: middle;
    }
    .feature-row:hover td { background: rgba(255,255,255,0.025); }
    .feature-name { font-weight: 600; }
    .mono { font-variant-numeric: tabular-nums; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-stable   { background: rgba(34,197,94,0.15);   color: var(--stable);   border: 1px solid rgba(34,197,94,0.3);   }
    .badge-warning  { background: rgba(245,158,11,0.15);  color: var(--warning);  border: 1px solid rgba(245,158,11,0.3);  }
    .badge-critical { background: rgba(239,68,68,0.15);   color: var(--critical); border: 1px solid rgba(239,68,68,0.3);   }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .chart-card { padding: 1rem; }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .chart-feature-name { font-weight: 600; font-size: 0.9rem; }
    .chart-container { position: relative; height: 200px; }
    .chart-container canvas { display: block; }

    .alert-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .alert-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .alert-dot { font-size: 0.65rem; padding-top: 0.3rem; flex-shrink: 0; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
      flex-wrap: wrap;
    }
    .alert-ts { color: var(--muted); font-size: 0.8rem; }
    .alert-features { font-size: 0.8rem; color: var(--muted); }
    .drift-feature { font-weight: 600; }

    .muted { color: var(--muted); }

    @media (max-width: 640px) {
      header { flex-wrap: wrap; padding: 0.6rem 1rem; }
      main { padding: 1rem; }
      .health-stats { gap: 1rem; }
      .sev-label { font-size: 1.1rem; }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<main id="app"></main>

        status: { overall_severity: 'critical', prediction_count: 13150, last_updated_relative: 'just now', baseline_exists: true },
        features: [
          { name: 'transaction_amount', dtype: 'numeric', severity: 'critical', psi: 0.58, ks_p_value: 0.0001,
            baseline_distribution: num([0,15,30,50,75,110,160,240,360,540,1000], [240,520,680,720,580,420,280,180,100,50]),
            current_distribution:  num([0,15,30,50,75,110,160,240,360,540,1000], [40,90,180,310,420,510,580,490,350,230]) },
          { name: 'merchant_category', dtype: 'categorical', severity: 'stable', psi: 0.02, ks_p_value: null,
            baseline_value_counts: { retail: 1380, food: 990, travel: 590, digital: 590, services: 390 },
            current_value_counts:  { retail: 1390, food: 985, travel: 595, digital: 588, services: 392 } },
          { name: 'card_age_days', dtype: 'numeric', severity: 'stable', psi: 0.03, ks_p_value: 0.387,
            baseline_distribution: num([0,60,120,200,300,400,500,650,800,1000,1500], [120,260,380,480,520,490,420,310,210,160]),
            current_distribution:  num([0,60,120,200,300,400,500,650,800,1000,1500], [125,255,385,478,518,492,418,312,208,162]) },
          { name: 'country_risk_score', dtype: 'numeric', severity: 'critical', psi: 0.62, ks_p_value: 0.00003,
            baseline_distribution: num([0,0.05,0.1,0.15,0.2,0.25,0.3,0.4,0.5,0.7,1.0], [380,580,720,640,500,380,250,180,80,40]),
            current_distribution:  num([0,0.05,0.1,0.15,0.2,0.25,0.3,0.4,0.5,0.7,1.0], [60,140,280,420,520,540,510,420,260,150]) },
          { name: 'time_of_day_hour', dtype: 'numeric', severity: 'stable', psi: 0.02, ks_p_value: 0.658,
            baseline_distribution: num([0,3,6,9,12,15,18,20,22,23,24], [180,160,180,200,240,260,250,200,170,160]),
            current_distribution:  num([0,3,6,9,12,15,18,20,22,23,24], [185,158,182,198,242,258,252,202,168,158]) },
        ],
        drift_reports: [
          { overall_severity: 'critical', detected_at: 'just now', feature_results: { transaction_amount:{severity:'critical'}, country_risk_score:{severity:'critical'}, merchant_category:{severity:'stable'}, card_age_days:{severity:'stable'}, time_of_day_hour:{severity:'stable'} } },
          { overall_severity: 'stable', detected_at: '6 min ago', feature_results: { transaction_amount:{severity:'stable'}, country_risk_score:{severity:'stable'}, merchant_category:{severity:'stable'}, card_age_days:{severity:'stable'}, time_of_day_hour:{severity:'stable'} } },
        ],
      },
    },
  },
};

// ── State ──────────────────────────────────────────────────────────────────
const MODEL_IDS = Object.keys(DEMO_DATA);
let selected = MODEL_IDS[0];
let chartInstances = {};

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', render);

// ── Helpers ────────────────────────────────────────────────────────────────
function snapshot(modelId) {
  const m = DEMO_DATA[modelId];
  return m.snapshots[m.state];
}

function setState(modelId, newState) {
  DEMO_DATA[modelId].state = newState;
  render();
}

function resetAll() {
  MODEL_IDS.forEach(m => { DEMO_DATA[m].state = 'stable'; });
  render();
}

// ── Rendering ──────────────────────────────────────────────────────────────
function render() {
  const tabs = document.getElementById('model-tabs');
  const app = document.getElementById('app');

  tabs.innerHTML = renderTabs();
  tabs.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { selected = btn.dataset.model; render(); });
  });

  destroyCharts();
  app.innerHTML = renderModelView(selected);

  // Wire control buttons
  const driftBtn = document.getElementById('btn-toggle-drift');
  if (driftBtn) {
    driftBtn.addEventListener('click', () => {
      const cur = DEMO_DATA[selected].state;
      setState(selected, cur === 'drifted' ? 'stable' : 'drifted');
    });
  }
  const resetAllBtn = document.getElementById('btn-reset-all');
  if (resetAllBtn) resetAllBtn.addEventListener('click', resetAll);

  // Build charts
  const snap = snapshot(selected);
  snap.features.forEach(f => buildChart(f));
}

function renderTabs() {
  return MODEL_IDS.map(id => {
    const sev = snapshot(id).status.overall_severity;
    const active = id === selected ? ' active' : '';
    return '<button class="tab-btn' + active + '" data-model="' + escAttr(id) + '">' +
      '<span class="tab-dot" style="color:' + col(sev) + '">●</span> ' + esc(id) +
    '</button>';
  }).join('');
}

function renderModelView(modelId) {
  const snap = snapshot(modelId);
  const status = snap.status;
  const features = snap.features;
  const reports = snap.drift_reports;
  const sev = status.overall_severity;
  const allStable = features.every(f => f.severity === 'stable');
  const anyDrifted = MODEL_IDS.some(m => DEMO_DATA[m].state === 'drifted');

  return '<div>' +
    renderHealthCard(status, modelId) +
    renderControlRow(modelId, anyDrifted) +
    renderStatusBanner(sev, features) +
    (allStable ? renderNominalBanner() : '') +
    renderDriftTable(features) +
    renderChartsSection(features) +
    renderAlertHistory(reports) +
  '</div>';
}

function renderHealthCard(status, modelId) {
  const sev = status.overall_severity;
  const icon = sev === 'stable' ? '●' : '⚠';
  return '<div class="health-card card" style="border-left:4px solid ' + col(sev) + ';margin-bottom:1rem">' +
    '<div class="health-top">' +
      '<div class="sev-indicator">' +
        '<span class="sev-dot" style="color:' + col(sev) + '">' + icon + '</span>' +
        '<span class="sev-label" style="color:' + col(sev) + '">' + esc(sev.toUpperCase()) + '</span>' +
      '</div>' +
      '<div class="health-stats">' +
        '<div class="stat"><span class="stat-val">' + fmtCount(status.prediction_count) + '</span><span class="stat-label">predictions monitored</span></div>' +
        '<div class="stat"><span class="stat-val">' + esc(status.last_updated_relative) + '</span><span class="stat-label">last updated</span></div>' +
        '<div class="stat"><span class="stat-val">Ready</span><span class="stat-label">baseline</span></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderControlRow(modelId, anyDrifted) {
  const isDrifted = DEMO_DATA[modelId].state === 'drifted';
  const btnLabel = isDrifted ? 'Reset to stable' : 'Simulate drift';
  const btnClass = isDrifted ? 'btn-reset' : 'btn-drift';
  const hint = isDrifted
    ? 'Click to return to baseline.'
    : 'Click to inject drifted feature distributions and watch the dashboard react.';
  const resetAll = anyDrifted && !isDrifted
    ? '<button class="btn btn-action btn-reset" id="btn-reset-all">Reset all models</button>'
    : '';
  return '<div class="control-row">' +
    '<button class="btn btn-action ' + btnClass + '" id="btn-toggle-drift">' + btnLabel + '</button>' +
    resetAll +
    '<span class="control-hint">' + esc(hint) + '</span>' +
  '</div>';
}

function renderStatusBanner(sev, features) {
  if (sev === 'critical') {
    const n = features.filter(f => f.severity === 'critical' || f.severity === 'warning').length;
    return '<div class="banner banner-critical"><span>⚠</span> Drift detected — ' + n + ' feature' + (n !== 1 ? 's' : '') + ' drifting</div>';
  }
  if (sev === 'warning') {
    const n = features.filter(f => f.severity !== 'stable').length;
    return '<div class="banner banner-warning"><span>⚠</span> Warning — ' + n + ' feature' + (n !== 1 ? 's' : '') + ' showing drift</div>';
  }
  return '';
}

function renderNominalBanner() {
  return '<div class="banner banner-stable"><span>✓</span> All systems nominal — no drift detected</div>';
}

function renderDriftTable(features) {
  const rows = features.map(f => {
    const psi = f.psi != null ? f.psi.toFixed(4) : '—';
    const ks  = f.ks_p_value != null ? f.ks_p_value.toFixed(3) : '—';
    return '<tr class="feature-row" style="border-left:3px solid ' + col(f.severity) + '">' +
      '<td class="feature-name">' + esc(f.name) + '</td>' +
      '<td>' + esc(f.dtype) + '</td>' +
      '<td class="mono">' + psi + '</td>' +
      '<td class="mono">' + ks + '</td>' +
      '<td><span class="badge badge-' + esc(f.severity) + '">' + esc(f.severity.toUpperCase()) + '</span></td>' +
    '</tr>';
  }).join('');

  return '<div class="section">' +
    '<h3 class="section-title">Feature Drift Scores</h3>' +
    '<div class="table-scroll">' +
      '<table class="drift-table">' +
        '<thead><tr><th>Feature</th><th>Type</th><th>PSI</th><th>KS p-value</th><th>Severity</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function renderChartsSection(features) {
  const cards = features.map(f => {
    const cid = 'chart-' + f.name.replace(/[^a-zA-Z0-9]/g, '_');
    return '<div class="chart-card card">' +
      '<div class="chart-header">' +
        '<span class="chart-feature-name">' + esc(f.name) + '</span>' +
        '<span class="badge badge-' + esc(f.severity) + '">' + esc(f.severity.toUpperCase()) + '</span>' +
      '</div>' +
      '<div class="chart-container"><canvas id="' + cid + '"></canvas></div>' +
    '</div>';
  }).join('');

  return '<div class="section">' +
    '<h3 class="section-title">Feature Distributions</h3>' +
    '<div class="charts-grid">' + cards + '</div>' +
  '</div>';
}

function renderAlertHistory(reports) {
  const title = '<h3 class="section-title">Recent Drift Events</h3>';
  if (!reports || reports.length === 0) {
    return '<div class="section">' + title + '<p class="muted" style="padding:0.5rem 0">No drift events recorded yet.</p></div>';
  }

  const items = reports.map(r => {
    const sev = r.overall_severity;
    const drifting = Object.entries(r.feature_results || {})
      .filter(([, v]) => v.severity !== 'stable')
      .sort((a, b) => (['critical','warning'].indexOf(a[1].severity)) -
                       (['critical','warning'].indexOf(b[1].severity)));

    let featHtml;
    if (drifting.length === 0) {
      featHtml = '<span class="muted">All features stable</span>';
    } else {
      featHtml = drifting.map(([name, v]) =>
        '<span class="drift-feature" style="color:' + col(v.severity) + '">' + esc(name) + ' → ' + esc(v.severity) + '</span>'
      ).join(' · ');
    }

    return '<div class="alert-item">' +
      '<div class="alert-dot" style="color:' + col(sev) + '">●</div>' +
      '<div class="alert-body">' +
        '<div class="alert-header">' +
          '<span class="badge badge-' + esc(sev) + '">' + esc(sev.toUpperCase()) + '</span>' +
          '<span class="alert-ts">' + esc(r.detected_at) + '</span>' +
        '</div>' +
        '<div class="alert-features">' + featHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="section">' + title + '<div class="alert-list">' + items + '</div></div>';
}

// ── Charts ─────────────────────────────────────────────────────────────────
function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
  chartInstances = {};
}

function buildChart(feature) {
  const cid = 'chart-' + feature.name.replace(/[^a-zA-Z0-9]/g, '_');
  const canvas = document.getElementById(cid);
  if (!canvas) return;

  const sev = feature.severity;
  const curColor = col(sev);
  let labels, baseData, curData;

  if (feature.dtype === 'numeric') {
    const bd = feature.baseline_distribution;
    const cd = feature.current_distribution;
    const edges = (bd || cd || {}).bin_edges;
    if (!edges || edges.length < 2) return;
    labels = binMids(edges).map(v => Math.abs(v) >= 100 ? v.toFixed(0) : v.toFixed(1));
    baseData = bd ? bd.bin_counts : new Array(labels.length).fill(0);
    curData  = cd ? cd.bin_counts : new Array(labels.length).fill(0);
  } else {
    const bc = feature.baseline_value_counts || {};
    const cc = feature.current_value_counts  || {};
    const keys = [...new Set([...Object.keys(bc), ...Object.keys(cc)])].sort();
    labels = keys.map(k => k.length > 12 ? k.slice(0,11) + '…' : k);
    baseData = keys.map(k => bc[k] || 0);
    curData  = keys.map(k => cc[k] || 0);
  }

  const baseRgba = 'rgba(100,116,139,0.4)';
  const curRgba  = hexRgba(curColor, 0.5);

  chartInstances[cid] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Baseline', data: baseData, backgroundColor: baseRgba, borderColor: 'rgba(100,116,139,0.9)', borderWidth: 1 },
        { label: 'Current',  data: curData,  backgroundColor: curRgba,  borderColor: hexRgba(curColor, 0.9),  borderWidth: 1 },
      ],
    },
    options: {
      animation: { duration: 350 },
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#94a3b8', boxWidth: 10, font: { size: 11 } } },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#e2e8f0', bodyColor: '#94a3b8',
          borderColor: '#334155', borderWidth: 1,
        },
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 }, maxRotation: labels.length > 8 ? 45 : 0 }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#334155' } },
      },
    },
  });
}

function binMids(edges) {
  const out = [];
  for (let i = 0; i < edges.length - 1; i++) out.push((edges[i] + edges[i+1]) / 2);
  return out;
}

// ── Utility ────────────────────────────────────────────────────────────────
function col(sev)  { return COLORS[sev] || COLORS.unknown; }
function fmtCount(n) { return (n || 0).toLocaleString(); }
function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s ?? '').replace(/"/g,'&quot;'); }
</script>
